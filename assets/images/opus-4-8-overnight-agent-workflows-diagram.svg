<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 420" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" role="img" aria-label="Dynamic workflow: orchestrator fan-out to parallel subagents closed by a verification gate">
  <rect width="1040" height="420" fill="#f8fafc"/>
  <text x="520" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">동적 워크플로: 팬아웃은 검증 게이트로 닫는다</text>
  <text x="520" y="62" text-anchor="middle" font-size="13" fill="#64748b">오케스트레이터 → 병렬 서브에이전트 → 검증 → 합성 (워커는 싸게, 게이트만 비싸게)</text>

  <defs>
    <marker id="oaw" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Orchestrator -->
  <rect x="40" y="170" width="150" height="80" rx="12" fill="#1B4F72"/>
  <text x="115" y="205" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">오케스트레이터</text>
  <text x="115" y="227" text-anchor="middle" font-size="11.5" fill="#cbd5e1">작업 분해 · 위임</text>

  <!-- Fan-out workers -->
  <text x="370" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#1B4F72">병렬 서브에이전트 (독립 갈래)</text>

  <rect x="250" y="116" width="240" height="44" rx="9" fill="#e0f2fe" stroke="#38bdf8"/>
  <text x="370" y="143" text-anchor="middle" font-size="12.5" font-weight="600" fill="#075985">탐색 · 읽기 · 검색  (haiku, 저비용)</text>

  <rect x="250" y="168" width="240" height="44" rx="9" fill="#e0f2fe" stroke="#38bdf8"/>
  <text x="370" y="195" text-anchor="middle" font-size="12.5" font-weight="600" fill="#075985">탐색 · 읽기 · 검색  (haiku, 저비용)</text>

  <rect x="250" y="220" width="240" height="44" rx="9" fill="#ede9fe" stroke="#a78bfa"/>
  <text x="370" y="247" text-anchor="middle" font-size="12.5" font-weight="600" fill="#5b21b6">구현 · 요약  (sonnet, 중간)</text>

  <text x="370" y="288" text-anchor="middle" font-size="11.5" fill="#94a3b8">…수십 갈래 병렬 (의존성 없을 때만 이득)…</text>

  <line x1="190" y1="210" x2="246" y2="138" stroke="#475569" stroke-width="2" marker-end="url(#oaw)"/>
  <line x1="190" y1="210" x2="246" y2="190" stroke="#475569" stroke-width="2" marker-end="url(#oaw)"/>
  <line x1="190" y1="210" x2="246" y2="242" stroke="#475569" stroke-width="2" marker-end="url(#oaw)"/>

  <!-- Collect -->
  <rect x="540" y="168" width="120" height="84" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="600" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">수집</text>
  <text x="600" y="226" text-anchor="middle" font-size="11.5" fill="#64748b">결과 모음</text>
  <line x1="490" y1="210" x2="536" y2="210" stroke="#475569" stroke-width="2.5" marker-end="url(#oaw)"/>

  <!-- Verify gate -->
  <rect x="700" y="160" width="150" height="100" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="775" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">검증 게이트</text>
  <text x="775" y="212" text-anchor="middle" font-size="11.5" fill="#92400e">적대적 반증 (opus)</text>
  <text x="775" y="230" text-anchor="middle" font-size="11.5" fill="#92400e">코드=테스트 통과</text>
  <text x="775" y="248" text-anchor="middle" font-size="11.5" fill="#92400e">다수 반증 → 폐기</text>
  <line x1="660" y1="210" x2="696" y2="210" stroke="#475569" stroke-width="2.5" marker-end="url(#oaw)"/>

  <!-- Synthesis -->
  <rect x="895" y="170" width="115" height="80" rx="12" fill="#dcfce7" stroke="#34d399" stroke-width="2"/>
  <text x="952" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">합성</text>
  <text x="952" y="222" text-anchor="middle" font-size="11.5" fill="#059669">정돈된 결과 1개</text>
  <line x1="850" y1="210" x2="891" y2="210" stroke="#475569" stroke-width="2.5" marker-end="url(#oaw)"/>

  <text x="520" y="350" text-anchor="middle" font-size="12.5" fill="#475569">검증 없는 팬아웃은 환각을 누적한다 · 품질 미달의 흔한 원인은 모델이 아니라 검증 단계 부재</text>
  <text x="520" y="388" text-anchor="middle" font-size="12" fill="#94a3b8">무인 장기 실행 = 동시 추론 폭증 → ThakiCloud: Kueue 큐잉 · vLLM 서빙 · 모델 등급 라우팅으로 흡수</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 380" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" role="img" aria-label="AI vibe coding learning loop: discover, experiment, observe, abstract, apply">
  <rect width="1040" height="380" fill="#f8fafc"/>
  <text x="520" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">AI 바이브 코딩 학습 루프</text>
  <text x="520" y="64" text-anchor="middle" font-size="13" fill="#64748b">Discover → Experiment → Observe → Abstract → Apply (then repeat)</text>

  <defs>
    <marker id="vbk" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1B4F72"/>
    </marker>
  </defs>

  <!-- 5 stage nodes -->
  <rect x="30" y="150" width="172" height="86" rx="14" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <text x="116" y="186" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">① 발견</text>
  <text x="116" y="210" text-anchor="middle" font-size="11.5" fill="#475569">Discover</text>

  <rect x="232" y="150" width="172" height="86" rx="14" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="318" y="186" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">② 실험</text>
  <text x="318" y="210" text-anchor="middle" font-size="11.5" fill="#475569">Experiment (주저 말 것)</text>

  <rect x="434" y="150" width="172" height="86" rx="14" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="520" y="186" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">③ 관찰</text>
  <text x="520" y="210" text-anchor="middle" font-size="11.5" fill="#475569">Observe</text>

  <rect x="636" y="150" width="172" height="86" rx="14" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="722" y="186" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">④ 추상화</text>
  <text x="722" y="210" text-anchor="middle" font-size="11.5" fill="#475569">Abstract</text>

  <rect x="838" y="150" width="172" height="86" rx="14" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="924" y="186" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">⑤ 응용</text>
  <text x="924" y="210" text-anchor="middle" font-size="11.5" fill="#475569">Apply</text>

  <!-- forward arrows -->
  <line x1="204" y1="193" x2="228" y2="193" stroke="#1B4F72" stroke-width="2.5" marker-end="url(#vbk)"/>
  <line x1="406" y1="193" x2="430" y2="193" stroke="#1B4F72" stroke-width="2.5" marker-end="url(#vbk)"/>
  <line x1="608" y1="193" x2="632" y2="193" stroke="#1B4F72" stroke-width="2.5" marker-end="url(#vbk)"/>
  <line x1="810" y1="193" x2="834" y2="193" stroke="#1B4F72" stroke-width="2.5" marker-end="url(#vbk)"/>

  <!-- return loop -->
  <path d="M924,236 L924,300 L116,300 L116,240" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#vbk)"/>
  <text x="520" y="294" text-anchor="middle" font-size="12" fill="#64748b">새 맥락에서 다시 — 이해는 실험 중·후에 따라온다</text>

  <text x="520" y="346" text-anchor="middle" font-size="12.5" fill="#64748b">핵심: 완전히 이해하기 전에 실험한다. 블랙박스를 두려워하지 않되, 핵심 로직엔 깊은 이해를 쓴다</text>
</svg>

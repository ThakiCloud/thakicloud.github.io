<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 400" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" role="img" aria-label="Saberr data flow from signals to team-fit decisions">
  <rect width="1040" height="400" fill="#f8fafc"/>
  <text x="520" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Saberr: 팀 케미를 데이터로 다루는 흐름</text>
  <text x="520" y="64" text-anchor="middle" font-size="13" fill="#64748b">From signals to team-fit decisions</text>

  <defs>
    <marker id="sbk" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Stage 1: 수집 -->
  <text x="180" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#1B4F72">① 데이터 수집</text>
  <rect x="40" y="116" width="280" height="230" rx="14" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <rect x="60" y="136" width="240" height="58" rx="10" fill="#fff" stroke="#bae6fd"/>
  <text x="180" y="161" text-anchor="middle" font-size="12.5" font-weight="600" fill="#075985">15분 가치·동기 설문</text>
  <text x="180" y="180" text-anchor="middle" font-size="10.5" fill="#475569">Schwartz 가치 이론 · 60차원 벡터</text>
  <rect x="60" y="202" width="240" height="58" rx="10" fill="#fff" stroke="#bae6fd"/>
  <text x="180" y="227" text-anchor="middle" font-size="12.5" font-weight="600" fill="#075985">행동 다양성 차트</text>
  <text x="180" y="246" text-anchor="middle" font-size="10.5" fill="#475569">Belbin 역할 · Big-5</text>
  <rect x="60" y="268" width="240" height="58" rx="10" fill="#fff" stroke="#bae6fd"/>
  <text x="180" y="293" text-anchor="middle" font-size="12.5" font-weight="600" fill="#075985">CoachBot 상호작용</text>
  <text x="180" y="312" text-anchor="middle" font-size="10.5" fill="#475569">Slack·이메일 메타데이터 (선택)</text>

  <line x1="324" y1="231" x2="372" y2="231" stroke="#475569" stroke-width="2.5" marker-end="url(#sbk)"/>

  <!-- Stage 2: 지표 -->
  <text x="520" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#1B4F72">② 핵심 지표</text>
  <rect x="378" y="116" width="284" height="230" rx="14" fill="#ede9fe" stroke="#a78bfa" stroke-width="2"/>
  <rect x="398" y="138" width="244" height="44" rx="9" fill="#fff" stroke="#ddd6fe"/>
  <text x="520" y="166" text-anchor="middle" font-size="12.5" font-weight="600" fill="#5b21b6">Pairwise Score · 궁합 예측</text>
  <rect x="398" y="190" width="244" height="44" rx="9" fill="#fff" stroke="#ddd6fe"/>
  <text x="520" y="218" text-anchor="middle" font-size="12.5" font-weight="600" fill="#5b21b6">Resonance · 팀 결속도</text>
  <rect x="398" y="242" width="244" height="44" rx="9" fill="#fff" stroke="#ddd6fe"/>
  <text x="520" y="270" text-anchor="middle" font-size="12.5" font-weight="600" fill="#5b21b6">Behaviour Diversity · 편중 경고</text>
  <rect x="398" y="294" width="244" height="44" rx="9" fill="#fff" stroke="#ddd6fe"/>
  <text x="520" y="322" text-anchor="middle" font-size="12.5" font-weight="600" fill="#5b21b6">Fit-Risk · 이탈 확률 추정</text>

  <line x1="666" y1="231" x2="714" y2="231" stroke="#475569" stroke-width="2.5" marker-end="url(#sbk)"/>

  <!-- Stage 3: 활용 -->
  <text x="860" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#1B4F72">③ 조직 적용</text>
  <rect x="720" y="116" width="280" height="230" rx="14" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <rect x="740" y="138" width="240" height="58" rx="10" fill="#fff" stroke="#86efac"/>
  <text x="860" y="163" text-anchor="middle" font-size="12.5" font-weight="600" fill="#166534">채용 1차 필터 · 면접 설계</text>
  <text x="860" y="182" text-anchor="middle" font-size="10.5" fill="#475569">탈락 기준 아닌 '탐색 신호'</text>
  <rect x="740" y="204" width="240" height="58" rx="10" fill="#fff" stroke="#86efac"/>
  <text x="860" y="229" text-anchor="middle" font-size="12.5" font-weight="600" fill="#166534">온보딩 90일 관계 형성</text>
  <text x="860" y="248" text-anchor="middle" font-size="10.5" fill="#475569">조기 퇴사 위험 감소</text>
  <rect x="740" y="270" width="240" height="58" rx="10" fill="#fff" stroke="#86efac"/>
  <text x="860" y="295" text-anchor="middle" font-size="12.5" font-weight="600" fill="#166534">스케일업 시 스쿼드 재편</text>
  <text x="860" y="314" text-anchor="middle" font-size="10.5" fill="#475569">케미 유지하며 확장</text>

  <text x="520" y="380" text-anchor="middle" font-size="12.5" fill="#64748b">'정답을 주는 시스템'이 아니라 '더 나은 질문을 만드는 시스템'</text>
</svg>

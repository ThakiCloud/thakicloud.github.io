<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 772" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" role="img" aria-label="LangChain Open Deep Research architecture from user query to research report">
  <rect width="920" height="772" fill="#f8fafc"/>
  <text x="460" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Open Deep Research 아키텍처</text>
  <text x="460" y="70" text-anchor="middle" font-size="13" fill="#64748b">LangChain Open Deep Research — query to synthesized report</text>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1B4F72"/>
    </marker>
  </defs>

  <rect x="180" y="120" width="560" height="60" rx="12" fill="#eef2f8" stroke="#1B4F72" stroke-width="2"/>
  <text x="460" y="156" text-anchor="middle" font-size="14.5" font-weight="600" fill="#0f172a">User query</text>
  <line x1="460" y1="180" x2="460" y2="212" stroke="#1B4F72" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect x="180" y="212" width="560" height="60" rx="12" fill="#dbe4f0" stroke="#1B4F72" stroke-width="2"/>
  <text x="460" y="248" text-anchor="middle" font-size="14.5" font-weight="600" fill="#0f172a">SupervisorAgent — query decompose</text>
  <line x1="460" y1="272" x2="460" y2="304" stroke="#1B4F72" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect x="180" y="304" width="560" height="60" rx="12" fill="#eef2f8" stroke="#1B4F72" stroke-width="2"/>
  <text x="460" y="333" text-anchor="middle" font-size="14.5" font-weight="600" fill="#0f172a">Parallel SpecialistAgents</text>
  <text x="460" y="351" text-anchor="middle" font-size="11" fill="#475569">academic · industry · news · technical</text>
  <line x1="460" y1="364" x2="460" y2="396" stroke="#1B4F72" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect x="180" y="396" width="560" height="60" rx="12" fill="#eef2f8" stroke="#1B4F72" stroke-width="2"/>
  <text x="460" y="425" text-anchor="middle" font-size="14.5" font-weight="600" fill="#0f172a">AdvancedRAGSystem</text>
  <text x="460" y="443" text-anchor="middle" font-size="11" fill="#475569">Arxiv · Web · VectorStore · External API · Structured Data</text>
  <line x1="460" y1="456" x2="460" y2="488" stroke="#1B4F72" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect x="180" y="488" width="560" height="60" rx="12" fill="#eef2f8" stroke="#1B4F72" stroke-width="2"/>
  <text x="460" y="517" text-anchor="middle" font-size="14.5" font-weight="600" fill="#0f172a">ContextualRankingEngine</text>
  <text x="460" y="535" text-anchor="middle" font-size="11" fill="#475569">relevance · recency · authority · diversity</text>
  <line x1="460" y1="548" x2="460" y2="580" stroke="#1B4F72" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect x="180" y="580" width="560" height="60" rx="12" fill="#eef2f8" stroke="#1B4F72" stroke-width="2"/>
  <text x="460" y="616" text-anchor="middle" font-size="14.5" font-weight="600" fill="#0f172a">SynthesisEngine</text>
  <line x1="460" y1="640" x2="460" y2="672" stroke="#1B4F72" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect x="180" y="672" width="560" height="60" rx="12" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="460" y="701" text-anchor="middle" font-size="14.5" font-weight="600" fill="#166534">Research report + QualityAssessment</text>
  <text x="460" y="719" text-anchor="middle" font-size="11" fill="#475569">citation · fact · coherence · originality</text>
</svg>

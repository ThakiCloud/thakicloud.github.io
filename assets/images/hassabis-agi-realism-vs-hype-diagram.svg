<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Inter, 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="900" height="420" fill="transparent"/>
  <!-- hype -->
  <rect x="300" y="16" width="300" height="62" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="450" y="42" text-anchor="middle" font-size="14" font-weight="600" fill="#991b1b">AGI hype</text>
  <text x="450" y="62" text-anchor="middle" font-size="12" fill="#7f1d1d">short timelines, provocative terms</text>
  <!-- realism -->
  <rect x="330" y="138" width="240" height="48" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="450" y="168" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a8a">Realism check</text>
  <!-- three points -->
  <rect x="30" y="250" width="270" height="120" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="165" y="290" text-anchor="middle" font-size="13" fill="#334155">Today's systems are</text>
  <text x="165" y="310" text-anchor="middle" font-size="13" fill="#334155">nowhere near AGI</text>

  <rect x="315" y="250" width="270" height="120" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="296" text-anchor="middle" font-size="13" fill="#334155">Missing: consistent</text>
  <text x="450" y="316" text-anchor="middle" font-size="13" fill="#334155">reasoning, true</text>
  <text x="450" y="336" text-anchor="middle" font-size="13" fill="#334155">generalization</text>

  <rect x="600" y="250" width="270" height="120" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="735" y="296" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Estimate roughly</text>
  <text x="735" y="316" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">3 to 4 years</text>
  <text x="735" y="336" text-anchor="middle" font-size="12" fill="#475569">(high uncertainty)</text>
  <!-- arrows -->
  <line x1="450" y1="78" x2="450" y2="138" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="400" y1="186" x2="200" y2="250" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="450" y1="186" x2="450" y2="250" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="500" y1="186" x2="700" y2="250" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
</svg>

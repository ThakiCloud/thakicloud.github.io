<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="Inter, 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="900" height="440" fill="transparent"/>
  <!-- Engineer -->
  <rect x="340" y="16" width="220" height="60" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="450" y="42" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a8a">Engineer</text>
  <text x="450" y="62" text-anchor="middle" font-size="12" fill="#475569">(orchestrator)</text>
  <!-- agents -->
  <rect x="60" y="140" width="220" height="48" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="170" y="170" text-anchor="middle" font-size="14" fill="#334155">Agent 1</text>
  <rect x="340" y="140" width="220" height="48" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="170" text-anchor="middle" font-size="14" fill="#334155">Agent 2</text>
  <rect x="620" y="140" width="220" height="48" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="730" y="170" text-anchor="middle" font-size="14" fill="#334155">Agent N ... hundreds</text>
  <!-- governance -->
  <rect x="280" y="252" width="340" height="60" rx="12" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="450" y="278" text-anchor="middle" font-size="14" font-weight="600" fill="#854d0e">Governance gate</text>
  <text x="450" y="298" text-anchor="middle" font-size="12" fill="#713f12">who approves high-risk actions?</text>
  <!-- accountability -->
  <rect x="300" y="362" width="300" height="48" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Org-level accountability</text>
  <!-- arrows -->
  <line x1="400" y1="76" x2="200" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="450" y1="76" x2="450" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="500" y1="76" x2="700" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="200" y1="188" x2="380" y2="252" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="450" y1="188" x2="450" y2="252" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="700" y1="188" x2="520" y2="252" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="450" y1="312" x2="450" y2="362" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
</svg>

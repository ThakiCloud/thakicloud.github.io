<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 440" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" role="img" aria-label="Llama-3.1-70B memory footprint by precision and GPU routing">
  <rect width="1040" height="440" fill="#f8fafc"/>
  <text x="520" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">정밀도별 모델 메모리와 GPU 라우팅</text>
  <text x="520" y="62" text-anchor="middle" font-size="13" fill="#64748b">Llama-3.1-70B weights footprint · BF16 → FP8 → NVFP4</text>

  <!-- Bar chart: memory footprint -->
  <text x="60" y="100" font-size="14" font-weight="700" fill="#1B4F72">① 가중치 메모리 풋프린트 (GB)</text>

  <!-- axis baseline -->
  <line x1="150" y1="320" x2="150" y2="120" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="150" y1="320" x2="470" y2="320" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- BF16 140GB -->
  <rect x="180" y="135" width="64" height="185" rx="6" fill="#94a3b8"/>
  <text x="212" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">~140GB</text>
  <text x="212" y="338" text-anchor="middle" font-size="12.5" font-weight="600" fill="#475569">BF16</text>

  <!-- FP8 70GB -->
  <rect x="280" y="227" width="64" height="93" rx="6" fill="#38bdf8"/>
  <text x="312" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">~70GB</text>
  <text x="312" y="338" text-anchor="middle" font-size="12.5" font-weight="600" fill="#475569">FP8 (Hopper)</text>

  <!-- NVFP4 35GB -->
  <rect x="380" y="273" width="64" height="47" rx="6" fill="#10b981"/>
  <text x="412" y="266" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">~35GB</text>
  <text x="412" y="338" text-anchor="middle" font-size="12.5" font-weight="600" fill="#475569">NVFP4 (Blackwell)</text>

  <text x="310" y="372" text-anchor="middle" font-size="11.5" fill="#64748b">FP8 대비 메모리 약 1/2 → KV 캐시·배치 여유 확보</text>

  <!-- GPU routing -->
  <text x="560" y="100" font-size="14" font-weight="700" fill="#1B4F72">② Kueue 노드풀별 양자화 분기</text>

  <rect x="560" y="120" width="180" height="86" rx="12" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="650" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#075985">Hopper 풀</text>
  <text x="650" y="173" text-anchor="middle" font-size="12.5" fill="#0369a1">H100 / A100</text>
  <text x="650" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#0c4a6e">→ FP8</text>

  <rect x="800" y="120" width="180" height="86" rx="12" fill="#dcfce7" stroke="#34d399" stroke-width="2"/>
  <text x="890" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Blackwell 풀</text>
  <text x="890" y="173" text-anchor="middle" font-size="12.5" fill="#059669">B200 / GB200</text>
  <text x="890" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">→ NVFP4</text>

  <!-- routing box -->
  <rect x="610" y="246" width="320" height="120" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="770" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">서빙 스택 (vLLM · TensorRT-LLM)</text>
  <text x="770" y="298" text-anchor="middle" font-size="12" fill="#475569">ModelOpt 양자화 → 엔진 빌드 → 서빙</text>
  <text x="770" y="320" text-anchor="middle" font-size="12" fill="#475569">정확도 회귀 게이트 (MMLU·HumanEval, BF16 대비)</text>
  <text x="770" y="342" text-anchor="middle" font-size="12" fill="#475569">허용 임계 0.5~1%p 미달 시 ArgoCD 배포 차단</text>

  <text x="520" y="412" text-anchor="middle" font-size="11.5" fill="#94a3b8">NVFP4는 Blackwell 전용 텐서 코어 포맷 · Hopper에서는 FP8이 최선 (출처: NVIDIA Technical Blog)</text>
</svg>

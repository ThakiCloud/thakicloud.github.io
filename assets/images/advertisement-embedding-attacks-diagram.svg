<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 470" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" role="img" aria-label="Advertisement Embedding Attack threat model">
  <rect width="1040" height="470" fill="#f8fafc"/>
  <text x="520" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">광고 임베딩 공격(AEA) 위협 모델</text>
  <text x="520" y="64" text-anchor="middle" font-size="13" fill="#64748b">Advertisement Embedding Attacks against LLMs (arXiv:2508.17674)</text>

  <defs>
    <marker id="amk" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="amkred" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- attack vectors -->
  <text x="150" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">공격 벡터 (Attack Vectors)</text>
  <rect x="28" y="112" width="244" height="74" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="150" y="142" text-anchor="middle" font-size="13.5" font-weight="600" fill="#991b1b">① 제3자 서비스 플랫폼 악용</text>
  <text x="150" y="164" text-anchor="middle" font-size="11.5" fill="#b91c1c">프롬프트·맥락에 광고 주입</text>
  <rect x="28" y="200" width="244" height="74" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="150" y="230" text-anchor="middle" font-size="13.5" font-weight="600" fill="#991b1b">② 백도어 OSS 체크포인트</text>
  <text x="150" y="252" text-anchor="middle" font-size="11.5" fill="#b91c1c">배포 모델에 백도어 삽입</text>

  <!-- LLM -->
  <rect x="392" y="150" width="190" height="100" rx="14" fill="#e2e8f0" stroke="#475569" stroke-width="2.5"/>
  <text x="487" y="190" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">LLM / AI 에이전트</text>
  <text x="487" y="214" text-anchor="middle" font-size="11.5" fill="#475569">감염된 추론 경로</text>

  <!-- output -->
  <rect x="700" y="150" width="200" height="100" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="800" y="184" text-anchor="middle" font-size="14.5" font-weight="700" fill="#92400e">광고 삽입 출력</text>
  <text x="800" y="206" text-anchor="middle" font-size="11.5" fill="#b45309">은밀히 조작된 응답</text>
  <text x="800" y="226" text-anchor="middle" font-size="11" fill="#a16207">개인·기업·개발자 영향</text>

  <line x1="272" y1="149" x2="388" y2="178" stroke="#ef4444" stroke-width="2.5" marker-end="url(#amkred)"/>
  <line x1="272" y1="237" x2="388" y2="220" stroke="#ef4444" stroke-width="2.5" marker-end="url(#amkred)"/>
  <line x1="582" y1="200" x2="696" y2="200" stroke="#64748b" stroke-width="2.5" marker-end="url(#amk)"/>

  <!-- defenses -->
  <rect x="28" y="312" width="872" height="120" rx="14" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="48" y="338" font-size="15" font-weight="700" fill="#166534">방어 계층 (Defense &amp; Mitigation)</text>
  <rect x="48" y="350" width="196" height="64" rx="10" fill="#fff" stroke="#86efac"/>
  <text x="146" y="378" text-anchor="middle" font-size="12.5" font-weight="600" fill="#166534">프롬프트 자체 검사</text>
  <text x="146" y="398" text-anchor="middle" font-size="10.5" fill="#475569">self-inspection</text>
  <rect x="256" y="350" width="196" height="64" rx="10" fill="#fff" stroke="#86efac"/>
  <text x="354" y="378" text-anchor="middle" font-size="12.5" font-weight="600" fill="#166534">입력 검증·정화</text>
  <text x="354" y="398" text-anchor="middle" font-size="10.5" fill="#475569">input validation</text>
  <rect x="464" y="350" width="196" height="64" rx="10" fill="#fff" stroke="#86efac"/>
  <text x="562" y="378" text-anchor="middle" font-size="12.5" font-weight="600" fill="#166534">모델 무결성 검증</text>
  <text x="562" y="398" text-anchor="middle" font-size="10.5" fill="#475569">integrity check</text>
  <rect x="672" y="350" width="212" height="64" rx="10" fill="#fff" stroke="#86efac"/>
  <text x="778" y="378" text-anchor="middle" font-size="12.5" font-weight="600" fill="#166534">생태계 수준 보안</text>
  <text x="778" y="398" text-anchor="middle" font-size="10.5" fill="#475569">ecosystem controls</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" role="img" aria-label="Architecture of a unified AI platform: a Vue web UI proxying OpenAI, Midjourney, Suno and video services, deployed on Docker and Kubernetes">
  <rect width="920" height="520" fill="#f8fafc"/>
  <text x="460" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">통합 AI 플랫폼 아키텍처</text>
  <text x="460" y="66" text-anchor="middle" font-size="13" fill="#64748b">One Vue web UI proxying many AI services</text>
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1B4F72"/>
    </marker>
  </defs>

  <rect x="210" y="94" width="500" height="56" rx="12" fill="#eef2f8" stroke="#1B4F72" stroke-width="2"/>
  <text x="460" y="118" text-anchor="middle" font-size="14.5" font-weight="600" fill="#0f172a">Web / PWA UI</text>
  <text x="460" y="137" text-anchor="middle" font-size="11" fill="#475569">Vue 3, Naive UI, Pinia, Tailwind CSS</text>
  <line x1="460" y1="150" x2="460" y2="180" stroke="#1B4F72" stroke-width="2.5" marker-end="url(#arr2)"/>

  <rect x="150" y="180" width="420" height="64" rx="12" fill="#dbe4f0" stroke="#1B4F72" stroke-width="2"/>
  <text x="360" y="207" text-anchor="middle" font-size="14.5" font-weight="600" fill="#0f172a">통합 프록시 백엔드</text>
  <text x="360" y="226" text-anchor="middle" font-size="11" fill="#475569">API gateway, auth, streaming relay</text>

  <rect x="610" y="186" width="260" height="52" rx="12" fill="#fef9e7" stroke="#b7791f" stroke-width="2"/>
  <text x="740" y="209" text-anchor="middle" font-size="13.5" font-weight="600" fill="#7c5314">Cloudflare R2</text>
  <text x="740" y="226" text-anchor="middle" font-size="11" fill="#8a6414">file / image storage</text>
  <line x1="570" y1="212" x2="606" y2="212" stroke="#b7791f" stroke-width="2.5" marker-end="url(#arr2)"/>

  <line x1="300" y1="244" x2="137" y2="288" stroke="#1B4F72" stroke-width="2.5" marker-end="url(#arr2)"/>
  <line x1="345" y1="244" x2="352" y2="288" stroke="#1B4F72" stroke-width="2.5" marker-end="url(#arr2)"/>
  <line x1="380" y1="244" x2="567" y2="288" stroke="#1B4F72" stroke-width="2.5" marker-end="url(#arr2)"/>
  <line x1="420" y1="244" x2="782" y2="288" stroke="#1B4F72" stroke-width="2.5" marker-end="url(#arr2)"/>

  <rect x="40" y="288" width="195" height="72" rx="12" fill="#eef2f8" stroke="#1B4F72" stroke-width="2"/>
  <text x="137" y="315" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">OpenAI</text>
  <text x="137" y="334" text-anchor="middle" font-size="11" fill="#475569">ChatGPT, Whisper, TTS</text>

  <rect x="255" y="288" width="195" height="72" rx="12" fill="#eef2f8" stroke="#1B4F72" stroke-width="2"/>
  <text x="352" y="315" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Midjourney</text>
  <text x="352" y="334" text-anchor="middle" font-size="11" fill="#475569">image generation</text>

  <rect x="470" y="288" width="195" height="72" rx="12" fill="#eef2f8" stroke="#1B4F72" stroke-width="2"/>
  <text x="567" y="315" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Suno</text>
  <text x="567" y="334" text-anchor="middle" font-size="11" fill="#475569">music generation</text>

  <rect x="685" y="288" width="195" height="72" rx="12" fill="#eef2f8" stroke="#1B4F72" stroke-width="2"/>
  <text x="782" y="315" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Luma, Runway, Pika</text>
  <text x="782" y="334" text-anchor="middle" font-size="11" fill="#475569">video generation</text>

  <rect x="150" y="418" width="620" height="58" rx="12" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="460" y="443" text-anchor="middle" font-size="14.5" font-weight="600" fill="#166534">Docker / Kubernetes 배포</text>
  <text x="460" y="462" text-anchor="middle" font-size="11" fill="#166534">macOS, Linux, Windows, container-native scaling</text>
</svg>

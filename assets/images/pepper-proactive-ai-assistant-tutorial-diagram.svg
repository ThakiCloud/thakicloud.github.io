  <text x="124.3305" y="99.85000000000001" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="124.3305" dy="-3.9000000000000012">Background monitors</tspan><tspan x="124.3305" dy="16.900000000000002">(Gmail, calendar, files)</tspan></text>

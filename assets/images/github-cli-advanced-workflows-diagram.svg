<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 430" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" role="img" aria-label="GitHub CLI integrated automation system architecture">
  <rect width="1040" height="430" fill="#f8fafc"/>
  <text x="520" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">GitHub CLI 통합 자동화 시스템</text>
  <text x="520" y="62" text-anchor="middle" font-size="13" fill="#64748b">zshrc 로드 → 모듈 → 통합 gh 디스패처 → GitHub</text>

  <defs>
    <marker id="gc" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- zshrc loader -->
  <rect x="40" y="170" width="140" height="80" rx="12" fill="#1B4F72"/>
  <text x="110" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">~/.zshrc</text>
  <text x="110" y="222" text-anchor="middle" font-size="11" fill="#cbd5e1">모듈 source</text>
  <text x="110" y="240" text-anchor="middle" font-size="11" fill="#cbd5e1">웰컴 · 단축키</text>

  <!-- modules -->
  <text x="370" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#1B4F72">스크립트 모듈</text>

  <rect x="250" y="112" width="240" height="42" rx="9" fill="#e0f2fe" stroke="#38bdf8"/>
  <text x="370" y="138" text-anchor="middle" font-size="12" font-weight="600" fill="#075985">master-controller (status·doctor·repair)</text>

  <rect x="250" y="160" width="240" height="42" rx="9" fill="#e0f2fe" stroke="#38bdf8"/>
  <text x="370" y="186" text-anchor="middle" font-size="12" font-weight="600" fill="#075985">cicd-integration (Actions·모니터)</text>

  <rect x="250" y="208" width="240" height="42" rx="9" fill="#e0f2fe" stroke="#38bdf8"/>
  <text x="370" y="234" text-anchor="middle" font-size="12" font-weight="600" fill="#075985">team-onboarding (권한·온보딩 이슈)</text>

  <rect x="250" y="256" width="240" height="42" rx="9" fill="#ede9fe" stroke="#a78bfa"/>
  <text x="370" y="282" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">wiki (문서 자동 동기화)</text>

  <line x1="180" y1="210" x2="246" y2="133" stroke="#475569" stroke-width="2" marker-end="url(#gc)"/>
  <line x1="180" y1="210" x2="246" y2="181" stroke="#475569" stroke-width="2" marker-end="url(#gc)"/>
  <line x1="180" y1="210" x2="246" y2="229" stroke="#475569" stroke-width="2" marker-end="url(#gc)"/>
  <line x1="180" y1="210" x2="246" y2="277" stroke="#475569" stroke-width="2" marker-end="url(#gc)"/>

  <!-- dispatcher -->
  <rect x="550" y="170" width="150" height="90" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="625" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">통합 gh()</text>
  <text x="625" y="222" text-anchor="middle" font-size="11" fill="#64748b">서브커맨드 라우팅</text>
  <text x="625" y="242" text-anchor="middle" font-size="11" fill="#64748b">미매칭 → 기본 gh</text>
  <line x1="490" y1="215" x2="546" y2="215" stroke="#475569" stroke-width="2.5" marker-end="url(#gc)"/>

  <!-- GitHub -->
  <rect x="760" y="150" width="220" height="130" rx="12" fill="#dcfce7" stroke="#34d399" stroke-width="2"/>
  <text x="870" y="178" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">GitHub</text>
  <text x="870" y="204" text-anchor="middle" font-size="11.5" fill="#065f46">Issues · Pull Requests</text>
  <text x="870" y="226" text-anchor="middle" font-size="11.5" fill="#065f46">Actions (CI/CD)</text>
  <text x="870" y="248" text-anchor="middle" font-size="11.5" fill="#065f46">Projects v2 · Wiki</text>
  <text x="870" y="270" text-anchor="middle" font-size="11.5" fill="#065f46">REST/GraphQL API</text>
  <line x1="700" y1="215" x2="756" y2="215" stroke="#475569" stroke-width="2.5" marker-end="url(#gc)"/>

  <text x="520" y="340" text-anchor="middle" font-size="12.5" fill="#475569">이슈 기반 개발: gh issue → PR → 리뷰어 자동 할당 → merge · 일일 리포트는 Actions schedule cron</text>
  <text x="520" y="378" text-anchor="middle" font-size="11.5" fill="#94a3b8">출처: GitHub CLI Manual (cli.github.com) · GitHub Actions Docs</text>
</svg>

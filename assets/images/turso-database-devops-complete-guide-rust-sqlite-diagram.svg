  <text x="606.2785" y="114.98333333333333" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="606.2785" dy="-3.9000000000000012">Embedded replica</tspan><tspan x="606.2785" dy="16.900000000000002">(local SQLite file)</tspan></text>
</g>
